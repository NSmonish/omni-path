apiVersion: v1
kind: Service
metadata:
  name: omni-redis
spec:
  ports:
    - port: 6379
  selector:
    app: omni-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omni-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omni-redis
  template:
    metadata:
      labels:
        app: omni-redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
